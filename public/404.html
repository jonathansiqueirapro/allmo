<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Allmo</title>
    <script>
      (function () {
        var base = '/allmo';
        var path = window.location.pathname;

        if (path.indexOf(base + '/') === 0) {
          path = path.slice(base.length);
        }

        window.location.replace(
          base + '/?path=' + encodeURIComponent(path.replace(/^\/+/, '')) + window.location.hash
        );
      }());
    </script>
  </head>
  <body></body>
</html>
